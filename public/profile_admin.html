<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Admin — Aneka Vandel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Poppins", sans-serif;
        background: #f0f4f8;
        min-height: 100vh;
      }
      .navbar {
        background: #0f2d6b;
        padding: 0 32px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
      }
      .navbar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .navbar-brand img {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        object-fit: contain;
        background: white;
      }
      .navbar-brand span {
        color: white;
        font-weight: 700;
        font-size: 17px;
      }
      .navbar-links {
        display: flex;
        align-items: center;
        gap: 24px;
      }
      .navbar-links a {
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: color 0.2s;
      }
      .navbar-links a:hover {
        color: white;
      }
      .btn-logout {
        background: #e53e3e;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 8px 18px;
        font-size: 13px;
        font-weight: 600;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: background 0.2s;
      }
      .btn-logout:hover {
        background: #c53030;
      }
      .layout {
        display: flex;
        min-height: calc(100vh - 64px);
      }
      .sidebar {
        width: 200px;
        background: white;
        border-right: 1px solid #e2e8f0;
        padding: 28px 0;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
      }
      .sidebar-greeting {
        padding: 0 20px 24px;
        border-bottom: 1px solid #e2e8f0;
      }
      .sidebar-greeting .hi {
        font-size: 14px;
        font-weight: 700;
        color: #1a202c;
      }
      .sidebar-greeting .sub {
        font-size: 11px;
        color: #718096;
        margin-top: 2px;
      }
      .sidebar-menu {
        padding: 16px 0;
        flex: 1;
      }
      .sidebar-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 20px;
        color: #4a5568;
        font-size: 13.5px;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        font-family: "Poppins", sans-serif;
      }
      .sidebar-item:hover {
        background: #f7fafc;
        color: #0f2d6b;
      }
      .sidebar-item.active {
        background: #ebf4ff;
        color: #0f2d6b;
        font-weight: 600;
        border-right: 3px solid #0f2d6b;
      }
      .sidebar-item svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .sidebar-divider {
        border: none;
        border-top: 1px solid #e2e8f0;
        margin: 8px 0;
      }
      .sidebar-logout {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 20px;
        color: #e53e3e;
        font-size: 13.5px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        font-family: "Poppins", sans-serif;
      }
      .sidebar-logout:hover {
        background: #fff5f5;
      }
      .main {
        flex: 1;
        padding: 32px 36px;
      }
      .page-title {
        font-size: 22px;
        font-weight: 700;
        color: #1a202c;
        margin-bottom: 4px;
      }
      .page-sub {
        font-size: 13px;
        color: #718096;
        margin-bottom: 28px;
      }
      .profile-card {
        background: white;
        border-radius: 12px;
        padding: 32px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        display: flex;
        gap: 40px;
      }
      .profile-form {
        flex: 1;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #2d3748;
        margin-bottom: 8px;
      }
      input[type="text"],
      input[type="email"],
      input[type="tel"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
        font-family: "Poppins", sans-serif;
        color: #2d3748;
        transition: all 0.2s;
        background: white;
      }
      input:focus {
        outline: none;
        border-color: #0f2d6b;
        box-shadow: 0 0 0 3px rgba(15, 45, 107, 0.08);
      }
      .btn-row {
        display: flex;
        gap: 12px;
        margin-top: 28px;
      }
      .btn-save {
        background: #0f2d6b;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px 24px;
        font-size: 13px;
        font-weight: 700;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-save:hover {
        background: #0a2255;
      }
      .btn-cancel {
        background: white;
        color: #4a5568;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        padding: 12px 24px;
        font-size: 13px;
        font-weight: 600;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-cancel:hover {
        border-color: #a0aec0;
      }
      .profile-photo-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .photo-label {
        font-size: 13px;
        font-weight: 600;
        color: #2d3748;
      }
      .photo-circle {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        cursor: pointer;
        border: 3px solid #e2e8f0;
        transition: border-color 0.2s;
      }
      .photo-circle:hover {
        border-color: #0f2d6b;
      }
      .photo-circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
      }
      .photo-circle svg {
        width: 48px;
        height: 48px;
        color: #a0aec0;
      }
      .btn-photo {
        background: white;
        color: #2d3748;
        border: 1.5px solid #e2e8f0;
        border-radius: 8px;
        padding: 8px 18px;
        font-size: 12px;
        font-weight: 600;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-photo:hover {
        border-color: #0f2d6b;
        color: #0f2d6b;
      }
      #fileInput {
        display: none;
      }
      .toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-60px);
        background: #111827;
        color: white;
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 13px;
        font-family: "Poppins", sans-serif;
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: transform 0.35s ease;
        z-index: 999;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
      }
      footer {
        background: #0f2d6b;
        color: rgba(255, 255, 255, 0.6);
        text-align: center;
        padding: 18px;
        font-size: 12px;
      }
      .footer-sosmed {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-bottom: 8px;
      }
      .footer-sosmed span {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a class="navbar-brand" href="#">
        <img src="./assets/logo-vandel.png" alt="Logo" />
        <span>Aneka Vandel</span>
      </a>
      <div class="navbar-links">
        <a href="about.html">About</a>
        <a href="catalog.html">Catalog</a>
        <button class="btn-logout" onclick="logout()">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16,17 21,12 16,7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Log Out
        </button>
      </div>
    </nav>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-greeting">
          <div class="hi">Halo, <span id="adminName">Min</span>! 👋</div>
          <div class="sub">Bagaimana kabarmu?</div>
        </div>
        <div class="sidebar-menu">
          <a href="dashboard_admin.html" class="sidebar-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
            </svg>
            Dashboard
          </a>
          <a href="profil_admin.html" class="sidebar-item active">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Profil Admin
          </a>
          <a href="kelola_pesanan.html" class="sidebar-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <path d="M16 10a4 4 0 01-8 0" />
            </svg>
            Kelola Pesanan
          </a>
          <a href="statistik.html" class="sidebar-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="20" x2="18" y2="10" />
              <line x1="12" y1="20" x2="12" y2="4" />
              <line x1="6" y1="20" x2="6" y2="14" />
            </svg>
            Statistik
          </a>
          <hr class="sidebar-divider" />
          <a href="catalog.html" class="sidebar-item">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
              <polyline points="9,22 9,12 15,12 15,22" />
            </svg>
            Lihat Catalog
          </a>
        </div>
        <button class="sidebar-logout" onclick="logout()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="16"
            height="16"
          >
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16,17 21,12 16,7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Keluar
        </button>
      </aside>

      <main class="main">
        <div class="page-title">Profil Admin</div>
        <div class="page-sub">Perbarui informasi profil Anda</div>

        <div class="profile-card">
          <div class="profile-form">
            <div class="form-group">
              <label>Nama Lengkap</label>
              <input type="text" id="fullName" placeholder="Nama lengkap" />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" placeholder="Email" />
            </div>
            <div class="form-group">
              <label>Nomor Telepon</label>
              <input type="tel" id="phone" placeholder="Nomor telepon" />
            </div>
            <div class="form-group">
              <label
                >Password Baru
                <span style="color: #a0aec0; font-weight: 400"
                  >(kosongkan jika tidak diganti)</span
                ></label
              >
              <input type="password" id="newPass" placeholder="Password baru" />
            </div>
            <div class="btn-row">
              <button class="btn-save" onclick="saveProfile()">
                Simpan Perubahan
              </button>
              <button class="btn-cancel" onclick="loadProfile()">Batal</button>
            </div>
          </div>
          <div class="profile-photo-section">
            <div class="photo-label">Foto Profil</div>
            <div
              class="photo-circle"
              onclick="document.getElementById('fileInput').click()"
            >
              <img id="profileImg" src="" alt="Foto Profil" />
              <svg
                id="defaultIcon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#a0aec0"
                stroke-width="1.5"
              >
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </div>
            <input
              type="file"
              id="fileInput"
              accept="image/*"
              onchange="handlePhoto(event)"
            />
            <button
              class="btn-photo"
              onclick="document.getElementById('fileInput').click()"
            >
              Pilih Foto
            </button>
          </div>
        </div>
      </main>
    </div>

    <footer>
      <div class="footer-sosmed">
        <span
          ><svg width="14" height="14" viewBox="0 0 24 24" fill="white">
            <path
              d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"
            />
            <circle cx="4" cy="4" r="2" /></svg
        ></span>
        <span
          ><svg width="14" height="14" viewBox="0 0 24 24" fill="white">
            <path
              d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"
            /></svg
        ></span>
        <span
          ><svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
          >
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
            <circle cx="12" cy="12" r="4" />
            <circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none" /></svg
        ></span>
        <span
          ><svg width="14" height="14" viewBox="0 0 24 24" fill="white">
            <path
              d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 00-1.95 1.96A29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 001.95-1.95A29 29 0 0023 12a29 29 0 00-.46-5.58z"
            />
            <polygon
              points="9.75,15.02 15.5,12 9.75,8.98 9.75,15.02"
              fill="#0f2d6b"
            /></svg
        ></span>
      </div>
      <p>© 2026 Aneka Vandel. All rights reserved</p>
    </footer>
    <div class="toast" id="toast"></div>

    <script>
      if (sessionStorage.getItem("isLoggedIn") !== "true")
        window.location.href = "login.html";
      const email = sessionStorage.getItem("userEmail") || "";
      const nameDisplay =
        email !== "google-user" ? email.split("@")[0] : "Admin";
      document.getElementById("adminName").textContent =
        nameDisplay.charAt(0).toUpperCase() + nameDisplay.slice(1);

      function loadProfile() {
        document.getElementById("fullName").value =
          sessionStorage.getItem("adminFullName") || nameDisplay;
        document.getElementById("email").value =
          email !== "google-user" ? email : "";
        document.getElementById("phone").value =
          sessionStorage.getItem("adminPhone") || "";
        document.getElementById("newPass").value = "";
      }
      loadProfile();

      function saveProfile() {
        sessionStorage.setItem(
          "adminFullName",
          document.getElementById("fullName").value,
        );
        sessionStorage.setItem(
          "adminPhone",
          document.getElementById("phone").value,
        );
        showToast("Profil berhasil disimpan!");
      }

      function handlePhoto(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          document.getElementById("profileImg").src = ev.target.result;
          document.getElementById("profileImg").style.display = "block";
          document.getElementById("defaultIcon").style.display = "none";
        };
        reader.readAsDataURL(file);
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
      }

      function logout() {
        sessionStorage.clear();
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
